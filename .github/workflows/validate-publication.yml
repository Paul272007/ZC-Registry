name: Registry Security Check
on:
  push:
    paths:
      - 'packages/**/*.json'
  pull_request:
    paths:
      - 'packages/**/*.json'

jobs:
  verify-identity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate Source Repository Ownership
        shell: bash
        run: |
          CHANGED_FILE=$(git diff --name-only HEAD^ HEAD | grep '\.json$' | head -n 1)
          
          if [ -z "$CHANGED_FILE" ]; then
            echo "No package JSON modified."
            exit 0
          fi
          
          echo "Checking package file: $CHANGED_FILE"
          
          OWNER=$(jq -r '.owner' "$CHANGED_FILE")
          ARCHIVE_URL=$(jq -r '.url' "$CHANGED_FILE")
          
          echo "Declared Owner: $OWNER"
          echo "Archive URL: $ARCHIVE_URL"
          
          if [[ "$ARCHIVE_URL" != *"github.com/$OWNER/"* ]]; then
            echo "::error::Security Alert: Archive URL does not belong to the declared owner ($OWNER)."
            exit 1
          fi
          
          ACTOR="${{ github.actor }}"
          if [[ "$ACTOR" != "$OWNER" && "$ACTOR" != "Paul272007" ]]; then
            echo "::error::Security Alert: User '$ACTOR' is trying to publish a package owned by '$OWNER'."
            exit 1
          fi
          
          echo "✅ Package integrity and ownership verified."
